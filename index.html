<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #151515; border: 1px solid #333; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; }
        h1 { color: #ff3333; margin-bottom: 20px; }
        input { width: 90%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 25px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .trigger { background: #e60000; color: white; box-shadow: 0 4px 15px rgba(230,0,0,0.3); }
        .clear { background: #333; color: #888; }
        #log { margin-top: 20px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TLB Remote</h1>
        <input type="text" id="alertMsg" placeholder="Type message here...">
        
        <button class="btn trigger" onclick="fire(true)">Trigger Alert</button>
        <button class="btn clear" onclick="fire(false)">All Clear</button>
        
        <div id="log">System: Ready</div>
    </div>

    <script>
        // Update this to your active tunnel link
        const TUNNEL = "https://lapinx-alert.loca.lt";

        async function fire(status) {
            const display = document.getElementById('log');
            const msg = document.getElementById('alertMsg').value || "EMERGENCY ALERT";
            
            display.innerText = "Connecting...";
            
            try {
                await fetch(TUNNEL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true' 
                    },
                    body: JSON.stringify({ active: status, message: msg })
                });
                display.innerText = status ? "SIGNAL: ACTIVE" : "SIGNAL: CLEARED";
                display.style.color = status ? "#ff3333" : "#44ff44";
            } catch (err) {
                display.innerText = "OFFLINE: Check PC Script";
                display.style.color = "orange";
            }
        }
    </script>
</body>
</html>
