<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TLB Remote</title>
    <style>
        body { 
            background: #050505; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: #111;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 1px; color: #eee; }
        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #ff3333; }
        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            transition: transform 0.1s, opacity 0.2s;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .trigger { background: #ff3333; color: white; }
        .clear { background: #222; color: #666; }
        #log {
            margin-top: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TLB REMOTE</h1>
        <input type="text" id="alertMsg" placeholder="Enter alert message...">
        
        <button class="btn trigger" onclick="fire(true)">Trigger Alert</button>
        <button class="btn clear" onclick="fire(false)">All Clear</button>
        
        <div id="log">System Ready</div>
    </div>

    <script>
        // IMPORTANT: Change this if your terminal shows a different URL
        const TUNNEL_URL = "https://lapinx-alert.loca.lt";

        async function fire(status) {
            const display = document.getElementById('log');
            const message = document.getElementById('alertMsg').value || "EMERGENCY ALERT";
            
            display.innerText = "Connecting...";
            display.style.color = "#888";

            try {
                // Using 'no-cors' allows the request to fire even if the browser 
                // thinks the tunnel response is 'insecure'.
                await fetch(TUNNEL_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true'
                    },
                    body: JSON.stringify({
                        active: status,
                        message: message
                    })
                });

                // With no-cors, we assume success if no error is thrown
                display.innerText = status ? "SIGNAL: ACTIVE" : "SIGNAL: CLEARED";
                display.style.color = status ? "#ff3333" : "#44ff44";

            } catch (err) {
                console.error("Fetch Error:", err);
                display.innerText = "OFFLINE: Check PC Script";
                display.style.color = "orange";
            }
        }
    </script>
</body>
</html>
