<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #111; border: 1px solid #333; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 25px; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; border: none; }
        .red { background: #ff0000; color: white; margin-bottom: 10px; }
        #status { font-size: 0.9rem; margin-top: 15px; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h1>TLB REMOTE</h1>
        <input type="text" id="m" placeholder="Alert Message...">
        <button class="btn red" onclick="send(true)">TRIGGER ALERT</button>
        <button class="btn" style="background:#333;color:#888;" onclick="send(false)">ALL CLEAR</button>
        <div id="status">Status: Waiting</div>
    </div>

    <script>
        // MUST MATCH YOUR TERMINAL URL EXACTLY
        const BRIDGE = "https://lapinx-alert.loca.lt"; 

        async function send(act) {
            const status = document.getElementById('status');
            const msg = document.getElementById('m').value || "EMERGENCY";
            
            status.innerText = "SENDING...";
            
            try {
                // Using 'no-cors' forces the browser to send the signal even if 
                // the tunnel's security page is being annoying.
                await fetch(BRIDGE, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: {
                        'Bypass-Tunnel-Reminder': 'true'
                    },
                    body: JSON.stringify({ active: act, message: msg })
                });
                
                status.innerText = "SIGNAL DISPATCHED";
                status.style.color = "#00ff00";
            } catch (e) {
                status.innerText = "NETWORK ERROR";
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
