<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TLB Alert Remote</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #0a0a0a; 
            color: white; 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #ff4444; text-transform: uppercase; letter-spacing: 2px; }
        
        input, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 20px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        
        .trigger { background: #ff0000; color: white; }
        .clear { background: #333; color: #888; margin-top: 10px; }
        
        #status {
            font-size: 0.8rem;
            margin-top: 15px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>TLB Remote</h2>
        <div id="status">Connecting to lapinx-alert...</div>

        <input type="text" id="msg" placeholder="Enter Alert Message...">
        
        <select id="severity">
            <option value="minor">Minor (Red/White)</option>
            <option value="caution">Caution (Yellow/Black)</option>
        </select>

        <button class="btn trigger" onclick="sendSignal(true)">Trigger Alert</button>
        <button class="btn clear" onclick="sendSignal(false)">All Clear / Close</button>
    </div>

    <script>
        // Use your specific Localtunnel subdomain
        const TUNNEL_URL = "https://lapinx-alert.loca.lt";

        async function sendSignal(active) {
            const statusDiv = document.getElementById('status');
            const messageText = document.getElementById('msg').value || "EMERGENCY ALERT";
            const severityValue = document.getElementById('severity').value;

            statusDiv.innerText = "Sending signal...";
            statusDiv.style.color = "yellow";

            try {
                const response = await fetch(TUNNEL_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true' // Crucial for Localtunnel
                    },
                    body: JSON.stringify({
                        active: active,
                        message: messageText,
                        type: severityValue
                    })
                });

                if (response.ok) {
                    statusDiv.innerText = active ? "ALERT ACTIVE" : "SYSTEM CLEARED";
                    statusDiv.style.color = active ? "#ff4444" : "#44ff44";
                } else {
                    statusDiv.innerText = "Error: Bridge Offline (503/404)";
                    statusDiv.style.color = "red";
                }
            } catch (error) {
                statusDiv.innerText = "Connection Failed. Check Tunnel.";
                statusDiv.style.color = "red";
                console.error(error);
            }
        }
    </script>
</body>
</html>
